name: MarkView
options:
  bundleIdPrefix: com.jonathanarteaga
  deploymentTarget:
    macOS: "14.0"
  createIntermediateGroups: true
settings:
  base:
    SWIFT_VERSION: "6.0"
    MACOSX_DEPLOYMENT_TARGET: "14.0"
    CLANG_ANALYZER_LOCALIZABILITY_NONLOCALIZED: YES
    ENABLE_DEBUG_DYLIB: NO
    CODE_SIGN_INJECT_BASE_ENTITLEMENTS: NO
  configs:
    Debug:
      ENABLE_HARDENED_RUNTIME: NO
    Release:
      ENABLE_HARDENED_RUNTIME: YES
targets:
  MarkViewCore:
    type: framework
    platform: macOS
    sources:
      - path: MarkViewCore/Sources
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.jonathanarteaga.markview.core
        GENERATE_INFOPLIST_FILE: YES
      configs:
        Release:
          ENABLE_HARDENED_RUNTIME: YES

  MarkViewPreviewExtension:
    type: app-extension
    platform: macOS
    sources:
      - path: MarkViewPreviewExtension/Sources
      - path: MarkViewPreviewExtension/Resources
    dependencies:
      - target: MarkViewCore
      - sdk: Quartz.framework
      - sdk: UniformTypeIdentifiers.framework
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.jonathanarteaga.markview.previewextension
        INFOPLIST_FILE: MarkViewPreviewExtension/Info.plist
        CODE_SIGN_ENTITLEMENTS: MarkViewPreviewExtension/MarkViewPreviewExtension.entitlements
        GENERATE_INFOPLIST_FILE: NO
        SKIP_INSTALL: YES
      configs:
        Release:
          ENABLE_HARDENED_RUNTIME: YES

  MarkView:
    type: application
    platform: macOS
    sources:
      - path: MarkView/App
      - path: MarkView/Views
      - path: MarkView/Resources
    dependencies:
      - target: MarkViewCore
      - target: MarkViewPreviewExtension
        embed: true
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.jonathanarteaga.markview
        INFOPLIST_FILE: MarkView/Info.plist
        CODE_SIGN_ENTITLEMENTS: MarkView/MarkView.entitlements
        GENERATE_INFOPLIST_FILE: NO
        MARKETING_VERSION: "0.1.1"
        CURRENT_PROJECT_VERSION: "1"
      configs:
        Release:
          ENABLE_HARDENED_RUNTIME: YES

  MarkViewTests:
    type: bundle.unit-test
    platform: macOS
    sources:
      - path: MarkViewTests
    dependencies:
      - target: MarkViewCore
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.jonathanarteaga.markview.tests
        GENERATE_INFOPLIST_FILE: YES
schemes:
  MarkView:
    build:
      targets:
        MarkView: all
        MarkViewTests: [test]
    test:
      targets:
        - MarkViewTests
      gatherCoverageData: false
